<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
  <div class="layout-container">
    <header class="brand-section">
      <h1>University Management Platform</h1>
      <p>Institutional portal for academic and administrative operations</p>
    </header>
    <main class="login-form-section">
      <div class="auth-card">
        <h2>Sign in</h2>
        <p>Access the University Management Platform</p>
        <form id="loginForm">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
          
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
          
          <div class="checkbox-container">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Remember me</label>
          </div>
          
          <button type="submit">Sign in</button>
          
          <a href="#" class="forgot-password-link">Forgot password?</a>
        </form>
        <div class="error-message"></div>
      </div>
    </main>
    <footer class="footer-section">
      <p>Secure institutional access</p>
    </footer>
  </div>
</body>
</html>
