<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - University Management System</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="card-container">
        <div class="dashboard-card">
            <h2 class="card-title">Academic Dashboard</h2>
            <div class="user-info">
                <p>Logged in as: <strong>{{ user.email }}</strong></p>
                <p>Role: <span class="badge">{{ user.get_role_display }}</span></p>
            </div>
            
            <div class="dashboard-actions">
                {% if user.is_super_admin_user or user.is_university_admin_user or user.is_college_admin_user %}
                    <a href="{% url 'accounts:admin_zone' %}" class="btn btn-secondary">Admin Zone</a>
                {% endif %}
                
                {% if user.is_super_admin_user %}
                    <a href="{% url 'accounts:super_admin_panel' %}" class="btn btn-secondary">Super Admin Panel</a>
                {% endif %}
                
                <a href="{% url 'accounts:logout' %}" class="btn btn-danger">Sign Out</a>
            </div>
        </div>
    </div>
</body>
</html>
